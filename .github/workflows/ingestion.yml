name: Job Ingestion

on:
  schedule:
    # Once daily at 9am ET (1pm UTC)
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        platform: [greenhouse, lever, ashby, icims, smartrecruiters, workable]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install httpx supabase "jobhive-py @ git+https://github.com/kalil0321/ats-scrapers.git"

      - name: Run ingestion for ${{ matrix.platform }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ATS_PLATFORM: ${{ matrix.platform }}
        run: python scripts/ingest.py

  trigger-scoring:
    needs: ingest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger scoring Lambda
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ca-central-1
        run: |
          pip install boto3
          python -c "
          import boto3
          client = boto3.client('lambda', region_name='ca-central-1')
          client.invoke(FunctionName='jobhunter-scoring', InvocationType='Event')
          print('Scoring Lambda triggered.')
          "

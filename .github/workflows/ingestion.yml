name: Job Ingestion

on:
  schedule:
    # Once daily at 9am ET (1pm UTC)
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix:
        include:
          # Greenhouse: 4966 companies, 5 chunks
          - platform: greenhouse
            chunk: 0
            total_chunks: 5
          - platform: greenhouse
            chunk: 1
            total_chunks: 5
          - platform: greenhouse
            chunk: 2
            total_chunks: 5
          - platform: greenhouse
            chunk: 3
            total_chunks: 5
          - platform: greenhouse
            chunk: 4
            total_chunks: 5
          # Lever: 2113 companies, 2 chunks
          - platform: lever
            chunk: 0
            total_chunks: 2
          - platform: lever
            chunk: 1
            total_chunks: 2
          # Ashby: 2856 companies, 3 chunks
          - platform: ashby
            chunk: 0
            total_chunks: 3
          - platform: ashby
            chunk: 1
            total_chunks: 3
          - platform: ashby
            chunk: 2
            total_chunks: 3
          # iCIMS: 1363 companies, 1 chunk
          - platform: icims
            chunk: 0
            total_chunks: 1
          # SmartRecruiters: 2214 companies, 2 chunks
          - platform: smartrecruiters
            chunk: 0
            total_chunks: 2
          - platform: smartrecruiters
            chunk: 1
            total_chunks: 2
          # Workable: 4269 companies, 4 chunks
          - platform: workable
            chunk: 0
            total_chunks: 4
          - platform: workable
            chunk: 1
            total_chunks: 4
          - platform: workable
            chunk: 2
            total_chunks: 4
          - platform: workable
            chunk: 3
            total_chunks: 4
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install httpx supabase "jobhive-py @ git+https://github.com/kalil0321/ats-scrapers.git"

      - name: Run ingestion for ${{ matrix.platform }} (chunk ${{ matrix.chunk }}/${{ matrix.total_chunks }})
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ATS_PLATFORM: ${{ matrix.platform }}
          CHUNK_INDEX: ${{ matrix.chunk }}
          TOTAL_CHUNKS: ${{ matrix.total_chunks }}
        run: python scripts/ingest.py

  trigger-scoring:
    needs: ingest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger scoring Lambda
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ca-central-1
        run: |
          pip install boto3
          python -c "
          import boto3
          client = boto3.client('lambda', region_name='ca-central-1')
          client.invoke(FunctionName='jobhunter-scoring', InvocationType='Event')
          print('Scoring Lambda triggered.')
          "
